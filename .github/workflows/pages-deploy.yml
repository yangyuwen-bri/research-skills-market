name: GitHub Pages Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rebuild showcase page
        run: |
          python3 scripts/publish_market_showcase.py --curated data/curated_market_v2.json --output docs/index.html

      - name: Configure GitHub Pages (auto enable)
        id: configure_pages_with_pat
        if: ${{ secrets.PAGES_ADMIN_TOKEN != '' }}
        uses: actions/configure-pages@v5
        with:
          token: ${{ secrets.PAGES_ADMIN_TOKEN }}
          enablement: true

      - name: Configure GitHub Pages
        id: configure_pages
        if: ${{ secrets.PAGES_ADMIN_TOKEN == '' || steps.configure_pages_with_pat.outcome != 'success' }}
        uses: actions/configure-pages@v5

      - name: Upload site
        if: ${{ steps.configure_pages_with_pat.outcome == 'success' || steps.configure_pages.outcome == 'success' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
